[SERVICE]
    log_level debug
    Parsers_File parsers.conf

[INPUT]
    Name forward
    Listen 0.0.0.0
    Port 24224

[INPUT]
    Name tail
    path /var/log/videochat/aaa/log/*.log
    Tag videochat.app.java.aaa

[INPUT]
    Name tail
    path /var/log/videochat/chat/log/*.log
    Tag videochat.app.golang.chat

[INPUT]
    Name tail
    path /var/log/videochat/storage/log/*.log
    Tag videochat.app.golang.storage

[INPUT]
    Name tail
    path /var/log/videochat/video/log/*.log
    Tag videochat.app.golang.video

[INPUT]
    Name tail
    path /var/log/videochat/event/log/*.log
    Tag videochat.app.golang.event

[INPUT]
    Name tail
    path /var/log/videochat/notification/log/*.log
    Tag videochat.app.golang.notification

[INPUT]
    Name tail
    path /var/log/videochat/public/log/*.log
    Tag videochat.app.nodejs.public

# for debug purposes
# [FILTER]
#     Name  stdout
#     Match *

[FILTER]
    Name parser
    Match videochat.app.*
    Parser just_json
    Reserve_Data on
    Key_Name log

[FILTER]
    Name parser
    Match videochat.infra.traefik
    Parser just_json
    Reserve_Data on
    Key_Name log

[FILTER]
    Name    modify
    Match   videochat.infra.traefik
    Condition Key_exists "RequestAddr"
    Set msg "access log"

[FILTER]
    Name modify
    Match videochat.infra.traefik
    Rename msg message
    Rename TraceId trace_id
    Rename SpanId span_id
    Rename StartUTC @timestamp
    Rename request_User-Agent user_agent
    Add service traefik

# [OUTPUT]
#     Name stdout
#     Match **

[OUTPUT]
    Name http
    Match *
    host victoria-logs
    port 9428
    # we have to use /logs path segment, because it's already set for sake frontend...
    uri /logs/insert/jsonline?_stream_fields=service,container_name&_msg_field=message&_time_field=@timestamp
    format json_lines
    json_date_format iso8601
    # https://github.com/fluent/fluent-bit/issues/309#issuecomment-311685689
    Retry_Limit 100
