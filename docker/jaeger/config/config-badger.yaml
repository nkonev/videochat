# https://github.com/jaegertracing/jaeger/blob/v2.18.0/cmd/jaeger/config-badger.yaml
service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
#    resource:
#      service.name: jaeger
#    metrics:
#      level: detailed
#      readers:
#        - pull:
#            exporter:
#              prometheus:
#                host: 0.0.0.0
#                port: 8888
    logs:
      level: info
    # TODO Initialize telemetry tracer once OTEL released new feature.
    # https://github.com/open-telemetry/opentelemetry-collector/issues/10663

extensions:
#  healthcheckv2:
#    use_v2: true
#    http:

  jaeger_query:
    storage:
      traces: some_store
      traces_archive: another_store
    ui:
      config_file: /etc/jaeger/config/config-ui.json
    http:
      endpoint: 0.0.0.0:16686
    base_path: /jaeger

  jaeger_storage:
    backends:
      some_store:
        badger:
          directories:
            keys: "/mnt/jaeger/"
            values: "/mnt/jaeger/"
          ephemeral: false
          ttl:
            spans: 168h # 7 days
          metrics_update_interval: ${env:BADGER_METRICS_UPDATE_INTERVAL:-10s}
      another_store:
        badger:
          directories:
            keys: "/mnt/jaeger_archive/"
            values: "/mnt/jaeger_archive/"
          ephemeral: false
          ttl:
            spans: 720h # 30 days
          metrics_update_interval: ${env:BADGER_METRICS_UPDATE_INTERVAL:-10s}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: some_store
